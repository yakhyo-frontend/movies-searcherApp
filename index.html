<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Omd Movies</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div data-aos="fade-down" data-aos-duration="1500" class="container">
      <h1 class="name">Omd Movies</h1>
      <div class="loading"></div>
      <!-- <label class="form-label">Search Movies:</label> -->
      <div class="search-box">
        <input type="search" class="input" placeholder="Search Movies..." />
        <button class="s-btn">Search</button>
      </div>

      <div class="list"></div>
    </div>

    <div id="overlay" class="overlay">
      <div class="modal"></div>
    </div>

    <script src="main.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
